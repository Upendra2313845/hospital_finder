<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareNavigator - Login / Signup</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="tabs">
      <button id="loginTab" class="active">Login</button>
      <button id="signupTab">Sign Up</button>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="form active" method="POST" action="/login">
      <h2>Login</h2>
      <input type="text" name="username" id="loginUsername" placeholder="Username" required>
      <input type="password" name="password" id="loginPassword" placeholder="Password" required>
      <button type="submit" class="btn">Login</button>
    </form>

    <!-- Signup Form -->
    <form id="signupForm" class="form" method="POST" action="/signup">
      <h2>Sign Up</h2>
      <input type="text" name="username" id="signupUsername" placeholder="Username" required>
      <input type="email" name="email" id="signupEmail" placeholder="Email" required>
      <input type="password" name="password" id="signupPassword" placeholder="Password" required>
      <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
      <button type="submit" class="btn">Sign Up</button>
    </form>
  </div>

  <script>
    // Switch between tabs (Login/Signup)
    const loginTab = document.getElementById("loginTab");
    const signupTab = document.getElementById("signupTab");
    const loginForm = document.getElementById("loginForm");
    const signupForm = document.getElementById("signupForm");

    loginTab.addEventListener("click", () => {
      loginForm.classList.add("active");
      signupForm.classList.remove("active");
      loginTab.classList.add("active");
      signupTab.classList.remove("active");
    });

    signupTab.addEventListener("click", () => {
      signupForm.classList.add("active");
      loginForm.classList.remove("active");
      signupTab.classList.add("active");
      loginTab.classList.remove("active");
    });
  </script>
</body>
</html>
